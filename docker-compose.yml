# OpenSpawner - Local Development / Workshop Docker Compose
#
# Usage: docker compose up --build
# Then open: http://localhost:3000
#
# No Traefik required - ports are exposed directly.
# Works on Docker Desktop (Windows, Mac, Linux).

services:
  # Flask API Backend
  spawner:
    build: .
    container_name: spawner
    restart: unless-stopped

    ports:
      - "5000:5000"

    volumes:
      - .env:/app/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - spawner-data:/app/data
      - spawner-logs:/app/logs

    environment:
      - TRAEFIK_ENABLED=false

    networks:
      - openspawner

    labels:
      - "spawner.managed=true"
      - "spawner.version=2.0.0"
      - "spawner.type=api-service"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      args:
        - INTERNAL_API_URL=http://spawner:5000
    container_name: spawner-frontend
    restart: unless-stopped

    ports:
      - "3000:3000"

    networks:
      - openspawner

    labels:
      - "spawner.managed=true"
      - "spawner.version=2.0.0"
      - "spawner.type=frontend-service"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    depends_on:
      - spawner

  # User container templates (built once, spawned per user)
  template-01:
    build: ./templates/template-01
    image: template-01:latest
    profiles: ["build"]

  template-02:
    build: ./templates/template-02
    image: template-02:latest
    profiles: ["build"]

  template-next:
    build: ./templates/template-next
    image: template-next:latest
    profiles: ["build"]

  template-dictionary:
    build: ./templates/template-dictionary
    image: template-dictionary:latest
    profiles: ["build"]

  template-vcoder:
    build: ./templates/template-vcoder
    image: template-vcoder:latest
    profiles: ["build"]

volumes:
  spawner-data:
  spawner-logs:

networks:
  openspawner:
    driver: bridge
