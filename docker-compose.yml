# OpenSpawner - Local Development / Workshop Docker Compose
#
# Usage: docker compose up --build
# Then open: http://localhost:3000
#
# No Traefik required - ports are exposed directly.
# Works on Docker Desktop (Windows, Mac, Linux).

services:
  # Flask API Backend
  backend:
    build: .
    image: openspawner-backend
    container_name: backend
    restart: unless-stopped

    ports:
      - "5000:5000"

    volumes:
      - .env:/app/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - spawner-data:/app/data
      - spawner-logs:/app/logs

    environment:
      - TRAEFIK_ENABLED=false

    networks:
      - openspawner

    labels:
      - "spawner.managed=true"
      - "spawner.version=2.0.0"
      - "spawner.type=api-service"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      args:
        - INTERNAL_API_URL=http://backend:5000
    image: openspawner-frontend
    container_name: frontend
    restart: unless-stopped

    ports:
      - "3000:3000"

    networks:
      - openspawner

    labels:
      - "spawner.managed=true"
      - "spawner.version=2.0.0"
      - "spawner.type=frontend-service"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    depends_on:
      - backend

  # User container templates (built once, spawned per user)
  template-nginx:
    build: ./templates/software/nginx
    image: template-nginx:latest
    profiles: ["build"]

  template-nextjs:
    build: ./templates/software/nextjs
    image: template-nextjs:latest
    profiles: ["build"]

  template-dictionary:
    build: ./templates/software/dictionary
    image: template-dictionary:latest
    profiles: ["build"]

  template-vcoder:
    build: ./templates/software/vcoder
    image: template-vcoder:latest
    profiles: ["build"]

  template-vscode:
    build: ./templates/software/vscode
    image: template-vscode:latest
    profiles: ["build"]

  template-office:
    build: ./templates/software/office
    image: template-office:latest
    profiles: ["build"]

  template-linuxmint:
    build: ./templates/os/linuxmint
    image: template-linuxmint:latest
    profiles: ["build"]

  template-mariadb:
    build: ./templates/database/mariadb
    image: template-mariadb:latest
    profiles: ["build"]

volumes:
  spawner-data:
  spawner-logs:

networks:
  openspawner:
    driver: bridge
